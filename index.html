<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard ABC</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(160deg, #1e1b4b, #0f172a);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 100px;
  }
  h1 {
    margin-bottom: 4px;
    font-size: 28px;
  }
  p.sub {
    color: #a5b4fc;
    margin-top: 0;
    margin-bottom: 40px;
    text-align: center;
  }
  .card-scene {
    width: 280px;
    height: 360px;
    perspective: 1000px;
    margin-bottom: 60px;
  }
  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(.4,.2,.2,1);
    cursor: pointer;
  }
  .card.flipped {
    transform: rotateY(180deg);
  }
  .face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    font-weight: bold;
  }
  .front {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    font-size: 140px;
  }
  .back {
    background: linear-gradient(135deg, #f59e0b, #ef4444);
    transform: rotateY(180deg);
    font-size: 60px;
    text-align: center;
    padding: 20px;
  }
  .emoji {
    font-size: 80px;
    margin-bottom: 10px;
  }
  .hint {
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    margin-top: 20px;
    letter-spacing: 1px;
  }
  .progress {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(255,255,255,0.1);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 14px;
  }
  .scroll-arrow {
    animation: bounce 1.5s infinite;
    font-size: 24px;
    margin-top: -30px;
    margin-bottom: 30px;
    color: #a5b4fc;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(10px); }
  }
  .done {
    font-size: 22px;
    color: #4ade80;
    margin-top: 20px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="progress">✅ <span id="flipCount">0</span>/3 flipped</div>

<h1>🧠 Flashcard Muscle Memory</h1>
<p class="sub">Klik setiap kad untuk flip &amp; lihat jawapan, scroll ke bawah untuk kad seterusnya</p>

<div class="card-scene">
  <div class="card" data-id="A" onclick="flip(this)">
    <div class="face front">A</div>
    <div class="face back">🍎<br>Apple</div>
  </div>
</div>
<div class="scroll-arrow">⬇️</div>

<div class="card-scene">
  <div class="card" data-id="B" onclick="flip(this)">
    <div class="face front">B</div>
    <div class="face back">⚽<br>Ball</div>
  </div>
</div>
<div class="scroll-arrow">⬇️</div>

<div class="card-scene">
  <div class="card" data-id="C" onclick="flip(this)">
    <div class="face front">C</div>
    <div class="face back">🎂<br>Cake</div>
  </div>
</div>

<div class="done" id="doneMsg" style="display:none;">🎉 Bagus! Semua kad sudah flip. Refresh untuk main semula.</div>

<script>
  const flipped = new Set();
  function flip(card) {
    card.classList.toggle('flipped');
    const id = card.getAttribute('data-id');
    if (card.classList.contains('flipped')) {
      flipped.add(id);
    } else {
      flipped.delete(id);
    }
    document.getElementById('flipCount').textContent = flipped.size;
    if (flipped.size === 3) {
      document.getElementById('doneMsg').style.display = 'block';
    } else {
      document.getElementById('doneMsg').style.display = 'none';
    }
  }
</script>

</body>
</html>
